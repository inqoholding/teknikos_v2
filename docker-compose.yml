version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: teknikos-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: teknikos
    ports:
      - "5432:5432"
    volumes:
      - ./backend/data/pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: teknikos-redis
    ports:
      - "6379:6379"
    volumes:
      - ./backend/data/redis_data:/data
    restart: unless-stopped

  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    platform: linux/amd64
    ports:
      - "3000:3000"
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY}
    restart: unless-stopped
