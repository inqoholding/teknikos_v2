version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: teknikos-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME:-teknikos}
    ports:
      - "5432:5432"
    volumes:
      - ./backend/data/pg_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.50'
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: teknikos-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./backend/data/redis_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    platform: linux/amd64
    ports:
      - "3000:3000"
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY}
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

networks:
  default:
    name: teknikos-nw
